{% extends 'base.html' %}
{% block title %}Add Student - Student Grade Tracker{% endblock %}
{% block content %}
<h2 class="mb-3">Add Student</h2>
<form method="post" class="card card-body shadow-sm" novalidate>
  <div class="mb-3">
    <label class="form-label">Student ID</label>
    <input class="form-control" name="student_id" required value="{{ student_id|default('') }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Name</label>
    <input class="form-control" name="name" required value="{{ name|default('') }}">
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('students.list_students_page') }}">Cancel</a>
  </div>
</form>
{% endblock %}
