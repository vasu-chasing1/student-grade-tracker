{% extends 'base.html' %}
{% block title %}Students - Student Grade Tracker{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0">Students</h2>
  <a class="btn btn-primary" href="{{ url_for('students.add_student_page') }}">Add Student</a>
</div>
<form class="row g-2 mb-3" method="get">
  <div class="col-md-6"><input class="form-control" name="q" value="{{ query }}" placeholder="Search by ID or name"></div>
  <div class="col-auto"><button class="btn btn-outline-primary" type="submit">Search</button></div>
</form>
<div class="table-responsive">
  <table class="table table-striped">
    <thead><tr><th>Student ID</th><th>Name</th><th class="text-end">Actions</th></tr></thead>
    <tbody>
      {% for student in students %}
      <tr>
        <td>{{ student[0] }}</td>
        <td>{{ student[1] }}</td>
        <td class="text-end">
          <form method="post" action="{{ url_for('students.delete_student_page', student_id=student[0]) }}" class="d-inline">
            <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="3" class="text-center text-muted">No students found.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
